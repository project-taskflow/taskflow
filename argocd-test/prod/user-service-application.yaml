apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: taskflow-user-service-prod
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
    ci.smartparking.io/last-release-sha: 0e574e5799de43a26f1be6706759380f78189422
    ci.smartparking.io/last-release-tag: v1.1.5
    ci.smartparking.io/last-released-at: "2026-04-27T15:33:02Z"
    ci.smartparking.io/last-released-by: Thanu-sri1
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/Thanu-sri1/task-ust.git
    targetRevision: main
    path: helm
    helm:
      releaseName: taskflow-user-service-prod
      valueFiles:
        - values-prod.yaml
      values: |
        configMap:
          enabled: false
        secret:
          enabled: false
        storageClass:
          enabled: false
        gateway:
          enabled: false
        httpRoute:
          enabled: false
        mongo:
          statefulSet:
            enabled: false
          service:
            enabled: false
        authService:
          enabled: false
        userService:
          enabled: true
          image: ghcr.io/project-taskflow/user-service:v1.1.5
        taskService:
          enabled: false
        notificationService:
          enabled: false
        analyticsService:
          enabled: false
        apiGateway:
          enabled: false
        frontend:
          enabled: false
  destination:
    server: https://kubernetes.default.svc
    namespace: prod
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
