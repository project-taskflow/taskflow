apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: taskflow-frontend-prod
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "3"
    ci.smartparking.io/last-release-sha: 97e74702acfe9946e6b0e7935513552691c27709
    ci.smartparking.io/last-release-tag: v1.1.6
    ci.smartparking.io/last-released-at: "2026-04-28T12:17:07Z"
    ci.smartparking.io/last-released-by: Thanu-sri1
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/project-taskflow/taskflow.git
    targetRevision: main
    path: helm
    helm:
      releaseName: taskflow-frontend-prod
      valueFiles:
        - values-prod.yaml
      values: |
        configMap:
          enabled: false
        secret:
          enabled: false
        storageClass:
          enabled: false
        gateway:
          enabled: false
        httpRoute:
          enabled: false
        mongo:
          statefulSet:
            enabled: false
          service:
            enabled: false
        authService:
          enabled: false
        userService:
          enabled: false
        taskService:
          enabled: false
        notificationService:
          enabled: false
        analyticsService:
          enabled: false
        apiGateway:
          enabled: false
        frontend:
          enabled: true
          image: ghcr.io/project-taskflow/frontend:v1.1.6
  destination:
    server: https://kubernetes.default.svc
    namespace: prod
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
