apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: taskflow-parent-dev
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/project-taskflow/taskflow.git
    targetRevision: main
    path: argocd-test/dev
    directory:
      recurse: true
      include: "*-application.yaml"
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
