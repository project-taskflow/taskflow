name: Deploy to Dev

on:
  push:
    branches:
      - develop

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/taskflow

jobs:
  # ── 1. Code Quality: Lint ──────────────────────────────────────────────────
  lint:
    name: Lint (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [auth-service, user-service, task-service, notification-service, analytics-service, api-gateway]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: src/services/${{ matrix.service }}/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: src/services/${{ matrix.service }}

      - name: Run ESLint
        run: npm run lint
        working-directory: src/services/${{ matrix.service }}

  lint-frontend:
    name: Lint & Build Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: src/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: src/frontend

      - name: Run ESLint
        run: npm run lint
        working-directory: src/frontend

      - name: Build frontend (verify it compiles)
        run: npm run build
        working-directory: src/frontend

  # ── 2. SAST: CodeQL (GitHub Advanced Security) ────────────────────────────
  codeql-sast:
    name: CodeQL SAST
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript
          # Scan for security issues AND hardcoded secrets
          queries: security-extended,security-and-quality

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:javascript"

  # ── 3. Secret Scanning: Gitleaks ─────────────────────────────────────────
  secret-scan:
    name: Gitleaks Secret Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── 4. Container Scanning: Trivy filesystem ───────────────────────────────
  trivy-fs-scan:
    name: Trivy Filesystem Scan
    runs-on: ubuntu-latest
    needs: [lint, lint-frontend]
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy (filesystem)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-fs.sarif'
          severity: 'HIGH,CRITICAL'
          exit-code: '0'

      - name: Upload Trivy SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-fs.sarif'

  # ── 5. Build & Push Docker Images ─────────────────────────────────────────
  build-and-push:
    name: Build & Push (${{ matrix.service }})
    runs-on: ubuntu-latest
    needs: [codeql-sast, secret-scan, trivy-fs-scan]
    permissions:
      contents: read
      packages: write
      security-events: write
    strategy:
      matrix:
        service: [auth-service, user-service, task-service, notification-service, analytics-service, api-gateway, frontend]
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Resolve build context path
        id: ctx
        run: |
          if [ "${{ matrix.service }}" = "frontend" ]; then
            echo "context=src/frontend" >> $GITHUB_OUTPUT
          else
            echo "context=src/services/${{ matrix.service }}" >> $GITHUB_OUTPUT
          fi

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: ${{ steps.ctx.outputs.context }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:dev
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:dev-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan built image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:dev'
          format: 'sarif'
          output: 'trivy-image-${{ matrix.service }}.sarif'
          severity: 'HIGH,CRITICAL'
          exit-code: '0'

      - name: Upload image scan to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-image-${{ matrix.service }}.sarif'

  # ── 6. Deploy to dev namespace ─────────────────────────────────────────────
  deploy-dev:
    name: Deploy → dev namespace
    runs-on: ubuntu-latest
    needs: [build-and-push]
    environment: dev
    steps:
      - uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'v1.30.0'

      - name: Configure kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBECONFIG_DEV }}" | base64 -d > $HOME/.kube/config
          chmod 600 $HOME/.kube/config

      - name: Apply PV/PVC for MongoDB
        run: kubectl apply -f k8s-manifests/dev/mongo-pv.yaml

      - name: Apply ConfigMap
        run: kubectl apply -f k8s-manifests/dev/configmap.yaml

      - name: Apply Secrets (injected from GitHub Secrets — never committed)
        run: |
          kubectl create secret generic app-secrets \
            --namespace=dev \
            --from-literal=JWT_SECRET="${{ secrets.JWT_SECRET }}" \
            --from-literal=MONGODB_URI="${{ secrets.MONGODB_URI_DEV }}" \
            --save-config \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy MongoDB + services
        run: |
          kubectl apply -f k8s-manifests/dev/mongo-deployments.yaml
          kubectl apply -f k8s-manifests/dev/auth-service.yaml
          kubectl apply -f k8s-manifests/dev/user-service.yaml
          kubectl apply -f k8s-manifests/dev/task-service.yaml
          kubectl apply -f k8s-manifests/dev/notification-service.yaml
          kubectl apply -f k8s-manifests/dev/analytics-service.yaml
          kubectl apply -f k8s-manifests/dev/api-gateway.yaml
          kubectl apply -f k8s-manifests/dev/frontend.yaml

      - name: Roll out new image tags
        run: |
          REGISTRY="${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}"
          SHA="${{ github.sha }}"
          for service in auth-service user-service task-service notification-service analytics-service api-gateway; do
            kubectl set image deployment/$service \
              $service=$REGISTRY/$service:dev-$SHA -n dev
          done
          kubectl set image deployment/frontend \
            frontend=$REGISTRY/frontend:dev-$SHA -n dev

      - name: Wait for rollout
        run: |
          for dep in auth-service user-service task-service notification-service analytics-service api-gateway frontend; do
            kubectl rollout status deployment/$dep -n dev --timeout=180s
          done

      - name: Verify deployment
        run: |
          echo "=== Pods ==="
          kubectl get pods -n dev -o wide
          echo "=== Services ==="
          kubectl get services -n dev
          echo "=== PVC ==="
          kubectl get pvc -n dev
