name: Notification Service CI/CD

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      release_tag:
        description: Release tag in the format notification-service-vX.Y.Z
        required: true
        type: string

jobs:
  ci:
    if: github.event_name != 'workflow_dispatch'
    uses: Nimesh-Capstone-Project/Parking-System/.github/workflows/reusable-ci.yaml@master
    with:
      trigger_event: ${{ github.event_name }}
      source_sha: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
      service_name: notification-service
      image_name: notification-service
      helm_values_key: notificationService
      dev_manifest_path: argocd/apps/dev/notification-service-dev.yaml
      sonar_key: Nimesh-Capstone-Project_Parking-System-NotificationService_6aec921f-7f98-4ab9-b558-3cee978b91a7
      docker_context: .
      dockerfile_path: ./Dockerfile
      working_directory: .
      infra_repository: Thanu-sri1/task-ust
      infra_ref: main
    secrets:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      SONAR_URL: ${{ secrets.SONAR_URL }}
      SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
      TOKEN: ${{ secrets.TOKEN }}
      EMAIL_USERNAME: ${{ secrets.EMAIL_USERNAME }}
      EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}

  release:
    if: github.event_name == 'workflow_dispatch'
    uses: Nimesh-Capstone-Project/Parking-System/.github/workflows/reusable-release.yaml@master
    with:
      release_tag: ${{ inputs.release_tag }}
      service_name: notification-service
      image_name: notification-service
      helm_values_key: notificationService
      dev_manifest_path: argocd/apps/dev/notification-service-dev.yaml
      prod_manifest_path: argocd/apps/prod/notification-service-prod.yaml
      infra_repository: Thanu-sri1/task-ust
      infra_ref: main
    secrets:
      TOKEN: ${{ secrets.TOKEN }}
      EMAIL_USERNAME: ${{ secrets.EMAIL_USERNAME }}
      EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}

